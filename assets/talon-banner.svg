<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="46" viewBox="0 0 1560 46">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.35">
    <stop offset="0" stop-color="#061B47"/>
    <stop offset="0.45" stop-color="#0B3A86"/>
    <stop offset="0.78" stop-color="#0E4FA6"/>
    <stop offset="1" stop-color="#0A2E72"/>
  </linearGradient>
  <radialGradient id="glow" cx="0.82" cy="0.5" r="0.6">
    <stop offset="0" stop-color="#27D3C4" stop-opacity="0.34"/>
    <stop offset="1" stop-color="#27D3C4" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#5EEAD4" stop-opacity="0"/>
    <stop offset="0.15" stop-color="#5EEAD4" stop-opacity="0.9"/>
    <stop offset="0.6" stop-color="#3FB6E0" stop-opacity="0.5"/>
    <stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.10"/>
    <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect width="1560" height="46" fill="url(#bg)"/>
<rect width="1560" height="46" fill="url(#glow)"/>
<!-- diagonal sheen streak -->
<g transform="skewX(-22)"><rect x="340" y="-10" width="120" height="66" fill="url(#sheen)"/>
<rect x="540" y="-10" width="46" height="66" fill="#ffffff" opacity="0.05"/></g>
<!-- ghost wordmark watermark, right -->
<text x="1534" y="34" text-anchor="end" font-family="Montserrat" font-weight="700" font-size="30"
      fill="#9FE9DF" opacity="0.07" letter-spacing="10">TALON</text>
<!-- feather / motion chevrons, right -->
<g stroke="#5EEAD4" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.55">
  <path d="M1180 14 l13 9 l-13 9"/>
  <path d="M1204 14 l13 9 l-13 9" opacity="0.6"/>
  <path d="M1228 14 l13 9 l-13 9" opacity="0.32"/>
</g>
<!-- left teal accent bar -->
<rect x="24" y="11" width="4" height="24" rx="2" fill="#5EEAD4"/>
<!-- eyebrow pill -->
<rect x="40" y="14" width="186" height="18" rx="9" fill="#5EEAD4" fill-opacity="0.12" stroke="#5EEAD4" stroke-opacity="0.35"/>
<text x="133" y="26.5" text-anchor="middle" font-family="JetBrains Mono" font-weight="600" font-size="9.5"
      fill="#7CF1E2" letter-spacing="2.4">BILLS &amp; CASH FLOW</text>
<!-- tagline -->
<text x="250" y="31" font-family="Montserrat" font-weight="600" font-size="20" fill="#F1F6FF" letter-spacing="0.2">Keep your bills in your grip<tspan fill="#5EEAD4" font-weight="700">.</tspan></text>
<!-- bottom hairline -->
<rect x="0" y="44" width="1560" height="2" fill="url(#rule)"/>
</svg>